<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Документы по согласованию</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #fdf7fb;
      --bg-soft: #fbf2f8;
      --surface: #ffffff;
      --surface-alt: #fff7fb;
      --surface-border: #f0dde7;

      --text-main: #2e1827;
      --text-muted: #7f6476;
      --text-faint: #b096aa;

      --primary: #d14f88;
      --primary-soft: #f5d0e1;
      --primary-border: #e1a6c3;

      --status-on-me-bg: #e5f4eb;
      --status-on-me-border: #b9dec3;
      --status-on-me-text: #2e7b4c;

      --status-approval-bg: #f7e2eb;
      --status-approval-border: #e3b1c7;
      --status-approval-text: #a3476b;

      --status-neutral-bg: #f7f1f6;
      --status-neutral-border: #e0d2df;
      --status-neutral-text: #756071;

      --mkt-bg: #f7edda;
      --mkt-border: #ddc18e;
      --mkt-text: #7f6327;

      --tag-comment-bg: #e4ecf7;
      --tag-comment-border: #c0d1ec;
      --tag-comment-text: #35548a;

      --tag-warning-bg: #fce5e9;
      --tag-warning-border: #f0bac3;
      --tag-warning-text: #b14457;

      --success-bg: #e6f5ea;
      --success-border: #c5e2ce;

      --shadow-card: 0 18px 40px rgba(120, 75, 105, 0.16);
      --radius-card: 30px;
      --radius-pill: 999px;
      --transition: 180ms cubic-bezier(0.2, 0.8, 0.25, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top left, #fef1f7 0, #fff9fb 40%, #f9f2f8 100%);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding-bottom: 16px;
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(255, 250, 252, 0.92);
      border-radius: 22px;
      border: 1px solid rgba(240, 221, 231, 0.9);
      box-shadow: 0 18px 40px rgba(137, 87, 115, 0.16);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .month-switcher {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      background: var(--surface);
      border-radius: 999px;
      border: 1px solid var(--surface-border);
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: none;
      background: var(--bg-soft);
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all var(--transition);
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: #f5e7f0;
    }

    .month-label {
      min-width: 140px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
    }

    .filters {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--surface-border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: var(--primary-border);
    }

    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-pill);
      border: none;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(209, 79, 136, 0.4);
      transition: all var(--transition);
    }

    .add-btn:hover {
      transform: translateY(-1px);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 12px 0 18px;
    }

    .summary-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--surface-border);
      padding: 12px 14px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .doc-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--surface-border);
      padding: 16px 18px 14px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
    }

    .doc-card.approved {
      background: var(--success-bg);
      border-color: var(--success-border);
    }

    .doc-main {
      flex: 1;
      min-width: 0;
    }

    .doc-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .doc-appendix {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--primary);
      white-space: nowrap;
    }

    .doc-project {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-main);
      min-width: 0;
      word-break: break-word;
    }

    .doc-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
    }

    .doc-meta span {
      white-space: nowrap;
    }

    .doc-meta span strong {
      font-weight: 600;
      color: var(--text-main);
    }

    .doc-tags {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-comment {
      padding: 6px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--tag-comment-border);
      background: var(--tag-comment-bg);
      font-size: 12px;
      font-weight: 600;
      color: var(--tag-comment-text);
    }

    .tag-warning {
      padding: 6px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--tag-warning-border);
      background: var(--tag-warning-bg);
      font-size: 12px;
      font-weight: 600;
      color: var(--tag-warning-text);
    }

    .doc-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .status-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .status-pill {
      border-radius: var(--radius-pill);
      padding: 9px 14px;
      border: 1px solid var(--status-neutral-border);
      background: var(--status-neutral-bg);
      font-size: 12px;
      font-weight: 700;
      color: var(--status-neutral-text);
      cursor: pointer;
      user-select: none;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .status-pill:hover {
      transform: translateY(-1px);
    }

    .status-pill.on-me {
      background: var(--status-on-me-bg);
      border-color: var(--status-on-me-border);
      color: var(--status-on-me-text);
    }

    .status-pill.approval {
      background: var(--status-approval-bg);
      border-color: var(--status-approval-border);
      color: var(--status-approval-text);
    }

    .status-pill.approved {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: #2f7c48;
    }

    .status-pill.inactive {
      opacity: 0.7;
    }

    .approval-deadline {
      font-size: 12px;
      font-weight: 700;
      color: var(--status-approval-text);
      text-align: center;
      margin-bottom: 4px;
    }

    .mkt-pill {
      border-radius: var(--radius-pill);
      padding: 8px 12px;
      border: 1px solid var(--mkt-border);
      background: var(--mkt-bg);
      color: var(--mkt-text);
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .mkt-pill span.icon {
      font-size: 13px;
    }

    .mkt-pill.active {
      background: #f0e0c0;
      border-color: #cfa96a;
    }

    .icon-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon-round-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--surface-border);
      background: var(--surface-alt);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .icon-round-btn:hover {
      background: #f4e5f0;
      border-color: #e0cede;
      color: var(--text-main);
      transform: translateY(-1px);
    }

    .loading,
    .empty,
    .error {
      margin-top: 16px;
      font-size: 14px;
    }

    .loading {
      color: var(--text-muted);
    }

    .empty {
      padding: 32px 18px;
      text-align: center;
      background: var(--surface);
      border-radius: 24px;
      border: 1px dashed var(--surface-border);
      color: var(--text-muted);
    }

    .empty strong {
      display: block;
      font-size: 16px;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .error {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #ffeef1;
      border: 1px solid #f2c0cd;
      color: #b34159;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(74, 41, 61, 0.26);
      backdrop-filter: blur(12px);
      z-index: 50;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(780px, 100%);
      max-height: min(92vh, 920px);
      overflow: auto;
      background: #fff9fc;
      border-radius: 22px;
      border: 1px solid #f1dbe7;
      box-shadow: 0 28px 60px rgba(112, 69, 95, 0.26);
      padding: 20px;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .close-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-pill);
      border: none;
      background: var(--bg-soft);
      cursor: pointer;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      border-radius: 14px;
      border: 1px solid #e7d4e1;
      background: #ffffff;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-main);
      outline: none;
      transition: all var(--transition);
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #d38db1;
      box-shadow: 0 0 0 3px rgba(211, 79, 136, 0.16);
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary-btn,
    .primary-btn {
      border-radius: 14px;
      border: none;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }

    .secondary-btn {
      background: #f3e5f0;
      color: var(--text-main);
    }

    .primary-btn {
      background: var(--primary);
      color: white;
      box-shadow: 0 12px 26px rgba(209, 79, 136, 0.32);
    }

    .secondary-btn:hover,
    .primary-btn:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .doc-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .doc-right {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 16px 12px 30px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .doc-right {
        flex-direction: column;
        align-items: flex-end;
      }

      .status-row {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 520px) {
      .summary {
        grid-template-columns: 1fr;
      }

      .modal-card {
        padding: 16px;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .secondary-btn,
      .primary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-title">Документы по согласованию</div>
          <div class="brand-subtitle">
            Компактный трекер по месяцам с этапами, МКТ и датами согласования
          </div>
        </div>

        <div class="controls">
          <div class="month-switcher">
            <button class="icon-btn" id="prevMonthBtn" type="button" aria-label="Предыдущий месяц">‹</button>
            <div class="month-label" id="monthLabel">—</div>
            <button class="icon-btn" id="nextMonthBtn" type="button" aria-label="Следующий месяц">›</button>
          </div>

          <div class="filters" id="filters">
            <button class="chip active" data-filter="all" type="button">Все статусы</button>
            <button class="chip" data-filter="active" type="button">Только актуальные</button>
            <button class="chip" data-filter="approved" type="button">Только согласованные</button>
          </div>

          <button class="add-btn" id="openCreateBtn" type="button" aria-label="Добавить документ">+</button>
        </div>
      </div>
    </div>

    <section class="summary" id="summary"></section>

    <div id="errorBox"></div>
    <div id="loadingBox" class="loading">Загрузка документов…</div>
    <section class="list" id="documentsList" hidden></section>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">Новый документ</div>
          <div class="modal-subtitle">
            Обязательные поля: номер приложения, контрагент и название проекта. Остальное можно не заполнять.
          </div>
        </div>
        <button class="close-btn" id="closeModalBtn" type="button" aria-label="Закрыть">✕</button>
      </div>

      <form id="docForm">
        <div class="form-grid">
          <div class="field">
            <label for="monthInput">Месяц</label>
            <input id="monthInput" name="month" type="month" required />
          </div>

          <div class="field">
            <label for="appendixInput">Номер приложения</label>
            <input id="appendixInput" name="appendixNumber" type="text" placeholder="Например, 156" required />
          </div>

          <div class="field full">
            <label for="projectInput">Название проекта / суть приложения</label>
            <input
              id="projectInput"
              name="projectName"
              type="text"
              placeholder="Например, продуктовые тесты"
              required
            />
          </div>

          <div class="field">
            <label for="counterpartyInput">Контрагент</label>
            <input id="counterpartyInput" name="counterparty" type="text" required />
          </div>

          <div class="field">
            <label for="internalInput">Внутренний номер</label>
            <input id="internalInput" name="internalNumber" type="text" placeholder="Номер в вашей системе" />
          </div>

          <div class="field">
            <label for="tenderInput">Номер тендерного решения</label>
            <input
              id="tenderInput"
              name="tenderNumber"
              type="text"
              placeholder="Например, ТР-00949 или «на согласовании»"
            />
          </div>

          <div class="field">
            <label for="stageInput">Текущий этап</label>
            <select id="stageInput" name="stage">
              <option value="0">На мне</option>
              <option value="1">На согласовании</option>
              <option value="2">Согласовано</option>
            </select>
          </div>

          <div class="field">
            <label for="approvalDateInput">Дата согласования (если известна)</label>
            <input id="approvalDateInput" name="approvalDate" type="date" />
          </div>

          <div class="field">
            <label for="approvalDeadlineInput">Срок согласования</label>
            <input id="approvalDeadlineInput" name="approvalDeadline" type="date" />
          </div>

          <div class="field">
            <label>МКТ</label>
            <label class="checkbox-row">
              <input id="inMktInput" type="checkbox" /> <span>Отправлено / относится к МКТ</span>
            </label>
          </div>

          <div class="field full">
            <label for="commentInput">Комментарий</label>
            <textarea
              id="commentInput
