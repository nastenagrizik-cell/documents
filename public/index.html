<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статус документов</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.72rem + 0.2vw, 0.84rem);
      --text-sm: clamp(0.875rem, 0.84rem + 0.25vw, 0.96rem);
      --text-base: clamp(1rem, 0.96rem + 0.2vw, 1.04rem);
      --text-lg: clamp(1.12rem, 1.04rem + 0.45vw, 1.28rem);
      --text-xl: clamp(1.4rem, 1.15rem + 0.8vw, 1.72rem);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;

      --color-bg: #f5f3f4;
      --color-surface: #fffdfd;
      --color-surface-2: #ffffff;
      --color-surface-offset: #f1ecef;
      --color-border: rgba(49, 33, 41, 0.09);
      --color-divider: rgba(49, 33, 41, 0.06);
      --color-text: #2e2027;
      --color-text-muted: #6e5a63;
      --color-text-faint: #9c8a92;
      --color-primary: #af4b71;
      --color-primary-hover: #97385d;
      --color-primary-soft: rgba(175, 75, 113, 0.1);
      --color-success: #2f8757;
      --color-success-soft: rgba(47, 135, 87, 0.12);
      --color-success-border: rgba(47, 135, 87, 0.26);
      --color-accent: #536fa9;
      --color-accent-soft: rgba(83, 111, 169, 0.1);
      --color-alert: #c65a65;
      --color-alert-soft: rgba(198, 90, 101, 0.1);
      --color-money: #9a7b27;
      --color-money-soft: rgba(154, 123, 39, 0.11);
      --shadow-sm: 0 8px 20px rgba(92, 63, 74, 0.05);
      --shadow-md: 0 20px 44px rgba(92, 63, 74, 0.08);
      --radius-sm: 0.75rem;
      --radius-md: 1rem;
      --radius-lg: 1.25rem;
      --radius-full: 999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', system-ui, sans-serif;
      --font-display: 'General Sans', 'Satoshi', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-text);
      background:
        radial-gradient(circle at 0% 0%, rgba(83,111,169,0.07), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(175,75,113,0.08), transparent 30%),
        linear-gradient(180deg, var(--color-bg) 0%, #f2eff1 100%);
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      padding: 0.74rem 0.9rem;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 14%, transparent);
    }
    textarea { min-height: 90px; resize: vertical; }

    .shell {
      width: min(1200px, calc(100% - 22px));
      margin: 18px auto;
      padding: 18px;
      background: color-mix(in srgb, var(--color-surface) 92%, transparent);
      border: 1px solid var(--color-border);
      border-radius: 30px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--color-primary-soft), var(--color-accent-soft));
      color: var(--color-primary);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .brand h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .icon-btn {
      min-width: 42px;
      min-height: 42px;
      border-radius: 14px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      color: var(--color-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 600;
      transition: transform var(--transition), filter var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .icon-btn:hover { transform: translateY(-1px); background: color-mix(in srgb, var(--color-primary) 8%, var(--color-surface-2)); }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 240px) 160px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .month-switcher, .compact-filter {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
    }
    .month-switcher { display: flex; align-items: center; overflow: hidden; }
    .month-nav {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: var(--color-text-muted);
    }
    .month-nav:hover { background: color-mix(in srgb, var(--color-accent) 8%, var(--color-surface-2)); color: var(--color-accent); }
    .month-current {
      flex: 1;
      padding: 0 10px;
      border-left: 1px solid var(--color-divider);
      border-right: 1px solid var(--color-divider);
    }
    .month-current input, .compact-filter input, .compact-filter select {
      border: 0;
      box-shadow: none;
      background: transparent;
    }
    .month-current input { font-weight: 700; }

    .list { display: grid; gap: 8px; }
    .doc-row {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(390px, 1.05fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 11px 14px;
      background: color-mix(in srgb, var(--color-surface-2) 89%, transparent);
      border: 1px solid var(--color-border);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
    }
    .doc-row.is-approved {
      background: color-mix(in srgb, var(--color-surface-offset) 58%, white);
      opacity: 0.98;
    }
    .doc-main { min-width: 0; }
    .doc-title-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .doc-number {
      font-family: var(--font-display);
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-primary);
      white-space: nowrap;
    }
    .doc-project {
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--color-text);
      min-width: 0;
    }
    .doc-meta {
      color: var(--color-text-muted);
      font-size: 0.77rem;
      display: flex;
      flex-wrap: wrap;
      gap: 5px 12px;
      align-items: center;
    }
    .doc-meta span { white-space: nowrap; }

    .decision-alert {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--color-alert-soft);
      border: 1px solid color-mix(in srgb, var(--color-alert) 24%, var(--color-border));
      color: var(--color-alert);
      font-size: 0.74rem;
      font-weight: 700;
    }
    .decision-alert .bang { font-size: 0.82rem; line-height: 1; }

    .comment-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--color-accent) 10%, white);
      border: 1px solid color-mix(in srgb, var(--color-accent) 22%, var(--color-border));
      color: var(--color-accent);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .steps {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }
    .step {
      flex: 1 1 0;
      min-width: 116px;
      min-height: 32px;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-faint);
      padding: 0 10px;
      font-size: 0.77rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.1;
      transition: transform var(--transition), background var(--transition), border-color var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .step:hover { transform: translateY(-1px); }
    .step.is-done {
      background: var(--color-success-soft);
      border-color: var(--color-success-border);
      color: var(--color-success);
    }
    .step.is-current {
      background: var(--color-primary-soft);
      border-color: color-mix(in srgb, var(--color-primary) 34%, var(--color-border));
      color: var(--color-primary);
    }

    .extra-tags {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .mkt-flag {
      min-height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--color-money) 22%, var(--color-border));
      background: color-mix(in srgb, var(--color-money) 5%, white);
      color: var(--color-money);
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .mkt-dollar {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--color-money-soft);
      color: var(--color-money);
      display: grid;
      place-items: center;
      font-size: 0.74rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .mkt-flag.is-on {
      background: linear-gradient(135deg, color-mix(in srgb, var(--color-money) 22%, white), color-mix(in srgb, var(--color-money) 10%, white));
      border-color: color-mix(in srgb, var(--color-money) 42%, var(--color-border));
      color: #6f5512;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    }
    .mkt-flag.is-on .mkt-dollar {
      background: var(--color-money);
      color: white;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .mini-btn {
      min-height: 32px;
      min-width: 32px;
      padding: 0 10px;
      border-radius: 11px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-size: 0.88rem;
    }
    .mini-btn:hover { color: var(--color-primary); border-color: color-mix(in srgb, var(--color-primary) 32%, var(--color-border)); }
    .mini-btn.delete:hover { color: var(--color-alert); border-color: rgba(198,90,101,0.3); }

    .comment-box {
      display: none;
      grid-column: 1 / -1;
      margin-top: -2px;
      padding: 0 2px 2px 2px;
    }
    .comment-box.open { display: block; }
    .comment-content {
      padding: 10px 12px;
      border-radius: 14px;
      background: color-mix(in srgb, var(--color-accent) 7%, white);
      border: 1px solid color-mix(in srgb, var(--color-accent) 16%, var(--color-border));
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .empty {
      padding: 42px 20px;
      background: var(--color-surface-2);
      border: 1px dashed var(--color-border);
      border-radius: 24px;
      text-align: center;
      color: var(--color-text-muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(36, 19, 27, 0.24);
      backdrop-filter: blur(8px);
      z-index: 50;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      max-height: min(90dvh, 920px);
      overflow: auto;
      background: color-mix(in srgb, var(--color-surface) 97%, transparent);
      border: 1px solid var(--color-border);
      border-radius: 28px;
      box-shadow: var(--shadow-md);
      padding: 22px;
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .modal-head h2 {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      line-height: 1.05;
      margin-bottom: 4px;
    }
    .modal-head p { color: var(--color-text-muted); font-size: var(--text-sm); }
    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .form-grid { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: var(--text-sm); font-weight: 700; }
    .field small { color: var(--color-text-faint); font-size: var(--text-xs); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      font-size: var(--text-sm);
      font-weight: 700;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      border-color: transparent;
      color: white;
    }

    @media (max-width: 1120px) {
      .toolbar { grid-template-columns: 1fr; }
      .doc-row { grid-template-columns: 1fr; align-items: stretch; }
      .row-actions { justify-content: flex-start; }
    }
    @media (max-width: 760px) {
      .shell { width: min(100% - 10px, 100%); margin: 5px; padding: 14px; border-radius: 22px; }
      .grid-2 { grid-template-columns: 1fr; }
      .steps { flex-wrap: wrap; }
      .step { flex: 1 1 calc(50% - 6px); min-width: 144px; }
      .modal-card { padding: 16px; border-radius: 22px; }
    }
    @media (max-width: 520px) {
      .doc-meta span { white-space: normal; }
      .step { flex: 1 1 100%; min-width: 100%; }
    }
  </style>

    <script>
      const api = {
        async getDocuments() {
          const res = await fetch('/api/documents');
          return res.json();
        },
        async getSuppliers() {
          const res = await fetch('/api/suppliers');
          return res.json();
        },
        async saveDocument(doc) {
          const res = await fetch('/api/documents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(doc)
          });
          return res.json();
        },
        async deleteDocument(id) {
          await fetch(`/api/documents/${id}`, { method: 'DELETE' });
        }
      };
    </script>

</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 4.75H14.8L18 7.95V19.25H7V4.75Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M14.5 4.75V8.25H18" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9.2 12.1H15.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M9.2 15.2H13.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>Статус документов</h1>
        </div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
      <button class="icon-btn" type="button" id="projectsMonthBtn" aria-label="Список проектов за месяц">≡</button>
      <button class="icon-btn" type="button" id="openModalBtn" aria-label="Добавить документ">+</button>
    </div>
    </header>

    <section class="toolbar" aria-label="Фильтры">
      <div class="month-switcher">
        <button class="month-nav" type="button" id="prevMonthBtn" aria-label="Предыдущий месяц">‹</button>
        <div class="month-current">
          <input type="month" id="activeMonth" />
        </div>
        <button class="month-nav" type="button" id="nextMonthBtn" aria-label="Следующий месяц">›</button>
      </div>
      <div class="compact-filter">
        <select id="statusFilter" aria-label="Фильтр по статусу">
          <option value="all">Все статусы</option>
          <option value="active">Только актуальные</option>
          <option value="approved">Только согласованные</option>
        </select>
      </div>
      <div class="compact-filter">
        <input type="search" id="searchInput" placeholder="Поиск: приложение, проект, контрагент, номер" aria-label="Поиск по документам" />
      </div>
    </section>

    <main>
      <section class="list" id="docsList"></section>
    </main>
  

  <div class="modal" id="projectsModal" aria-hidden="true">
    <div class="modal-card" style="width:min(480px,100%);" role="dialog" aria-modal="true" aria-labelledby="projectsModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="projectsModalTitle">Проекты за месяц</h2>
        </div>
        <button class="close-btn" type="button" id="closeProjectsModalBtn" aria-label="Закрыть">✕</button>
      </div>
      <div id="projectsMonthList" style="display:grid; gap:8px;"></div>
    </div>
  </div>

  <div class="modal" id="docModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">Новый документ</h2>
          <p>Обязательные поля: номер приложения, контрагент и название проекта. Остальное можно не заполнять.</p>
        </div>
        <button class="close-btn" type="button" id="closeModalBtn" aria-label="Закрыть">✕</button>
      </div>

      <form id="docForm" class="form-grid">
        <input type="hidden" id="docId" />
        <div class="grid-2">
          <div class="field">
            <label for="monthInput">Месяц</label>
            <input type="month" id="monthInput" />
          </div>
          <div class="field">
            <label for="appendixNumber">Номер приложения</label>
            <input type="text" id="appendixNumber" placeholder="Например, 7" required />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="projectName">Название проекта / суть приложения</label>
            <input type="text" id="projectName" placeholder="Короткое название для списка" required />
          </div>
          <div class="field">
            <label for="counterparty">Контрагент</label>
            <input type="text" id="counterparty" list="counterpartySuggestions" placeholder="Название компании" required />
            <datalist id="counterpartySuggestions"></datalist>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="internalNumber">Внутренний номер</label>
            <input type="text" id="internalNumber" placeholder="Необязательно" />
          </div>
          <div class="field">
            <label for="tenderNumber">Номер тендерного решения</label>
            <input type="text" id="tenderNumber" list="tenderSuggestions" placeholder="Номер или текст 'на согласовании'" />
            <datalist id="tenderSuggestions"><option value="на согласовании"></option></datalist>
            <small>Если решение еще в процессе, можно прямо так и написать: «на согласовании».</small>
          </div>
        </div>

        <div class="field">
          <label for="commentInput">Комментарий</label>
          <textarea id="commentInput" placeholder="Необязательно. Например: ждем правку, отправить повторно, проверить после ответа"></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn" type="button" id="cancelBtn">Отмена</button>
          <button class="btn primary" type="submit" id="saveBtn">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const LEGACY_KEYS = ['approval-tracker-docs-v3', 'approval-tracker-docs-v2', 'approval-tracker-docs-v1'];
    const STORAGE_KEY = 'approval-tracker-docs-v4';
    const SUPPLIER_KEY = 'approval-tracker-suppliers-v1';
    const STEPS = [
      { key: 'on_me', label: 'На мне' },
      { key: 'in_review', label: 'На согласовании' },
      { key: 'approved', label: 'Согласовано' }
    ];

    const state = {
      docs: loadDocs(),
      suppliers: loadSuppliers(),
      activeMonth: getCurrentMonth(),
      openComments: new Set()
    };

    const activeMonthInput = document.getElementById('activeMonth');
    const statusFilter = document.getElementById('statusFilter');
    const searchInput = document.getElementById('searchInput');
    const docsList = document.getElementById('docsList');
    const openModalBtn = document.getElementById('openModalBtn');
    const projectsMonthBtn = document.getElementById('projectsMonthBtn');
    const projectsModal = document.getElementById('projectsModal');
    const closeProjectsModalBtn = document.getElementById('closeProjectsModalBtn');
    const projectsMonthList = document.getElementById('projectsMonthList');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const docModal = document.getElementById('docModal');
    const docForm = document.getElementById('docForm');
    const docId = document.getElementById('docId');
    const monthInput = document.getElementById('monthInput');
    const appendixNumber = document.getElementById('appendixNumber');
    const internalNumber = document.getElementById('internalNumber');
    const tenderNumber = document.getElementById('tenderNumber');
    const projectName = document.getElementById('projectName');
    const counterparty = document.getElementById('counterparty');
    const commentInput = document.getElementById('commentInput');
    const supplierSuggestions = document.getElementById('counterpartySuggestions');
    const modalTitle = document.getElementById('modalTitle');
    const saveBtn = document.getElementById('saveBtn');
    const prevMonthBtn = document.getElementById('prevMonthBtn');
    const nextMonthBtn = document.getElementById('nextMonthBtn');

    activeMonthInput.value = state.activeMonth;
    monthInput.value = state.activeMonth;
    renderSupplierSuggestions();
    render();

    function getCurrentMonth() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function loadDocs() {
      try {
        const current = localStorage.getItem(STORAGE_KEY);
        if (current) return JSON.parse(current);

        for (const key of LEGACY_KEYS) {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw).map((doc, index) => ({
            ...doc,
            internalNumber: doc.internalNumber || '',
            tenderNumber: doc.tenderNumber || '',
            comment: doc.comment || '',
            mktDone: Boolean(doc.mktDone),
            sortIndex: Number.isFinite(doc.sortIndex) ? doc.sortIndex : index
          }));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
          return parsed;
        }
        return [];
      } catch {
        return [];
      }
    }

    function loadSuppliers() {
      try {
        const raw = localStorage.getItem(SUPPLIER_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveDocs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.docs));
    }

    function saveSuppliers() {
      localStorage.setItem(SUPPLIER_KEY, JSON.stringify(state.suppliers));
    }

    function rememberSupplier(name) {
      const value = String(name || '').trim();
      if (!value) return;
      const exists = state.suppliers.some(item => item.toLowerCase() === value.toLowerCase());
      if (!exists) {
        state.suppliers = [...state.suppliers, value].sort((a, b) => a.localeCompare(b, 'ru'));
        saveSuppliers();
        renderSupplierSuggestions();
      }
    }

    function renderSupplierSuggestions() {
      supplierSuggestions.innerHTML = state.suppliers.map(name => `<option value="${escapeHtml(name)}"></option>`).join('');
    }

    function render() {
      const filtered = getFilteredDocs();
      renderList(filtered);
    }

    function renderProjectsMonthList() {
      const title = document.getElementById('projectsModalTitle');
      title.textContent = `Проекты за ${formatMonth(state.activeMonth)}`;
      const items = state.docs.filter(doc => doc.month === state.activeMonth);
      if (!items.length) {
        projectsMonthList.innerHTML = '<div class="empty" style="padding:20px; border-radius:18px;">В этом месяце пока нет проектов.</div>';
        return;
      }
      projectsMonthList.innerHTML = items.map(doc => `<div style="padding:10px 12px; border:1px solid var(--color-border); border-radius:14px; background:var(--color-surface-2); font-size:var(--text-sm); color:var(--color-text);">${escapeHtml(doc.projectName || displayAppendix(doc.appendixNumber))} — ${escapeHtml(doc.counterparty)}</div>`).join('');
    }

    function openProjectsModal() {
      renderProjectsMonthList();
      projectsModal.classList.add('open');
      projectsModal.setAttribute('aria-hidden', 'false');
    }

    function closeProjectsModal() {
      projectsModal.classList.remove('open');
      projectsModal.setAttribute('aria-hidden', 'true');
    }

    function getFilteredDocs() {
      const q = searchInput.value.trim().toLowerCase();
      const statusValue = statusFilter.value;
      return state.docs
        .filter(doc => doc.month === state.activeMonth)
        .filter(doc => {
          if (statusValue === 'approved') return doc.status === 'approved';
          if (statusValue === 'active') return doc.status !== 'approved';
          return true;
        })
        .filter(doc => {
          if (!q) return true;
          const haystack = [displayAppendix(doc.appendixNumber), doc.internalNumber, doc.projectName, doc.counterparty, doc.tenderNumber, doc.comment].join(' ').toLowerCase();
          return haystack.includes(q);
        })
        .sort((a, b) => {
          if (a.status === 'approved' && b.status !== 'approved') return 1;
          if (a.status !== 'approved' && b.status === 'approved') return -1;
          return (a.sortIndex ?? 0) - (b.sortIndex ?? 0);
        });
    }

    function renderList(list) {
      if (!list.length) {
        docsList.innerHTML = `<div class="empty">В этом месяце пока нет документов по текущему фильтру.</div>`;
        return;
      }

      docsList.innerHTML = list.map(doc => {
        const hasDecisionAlert = isDecisionInProgress(doc.tenderNumber);
        const hasComment = Boolean(doc.comment && doc.comment.trim());
        const commentOpen = state.openComments.has(doc.id);
        return `
          <article class="doc-row ${doc.status === 'approved' ? 'is-approved' : ''}" data-id="${doc.id}">
            <div class="doc-main">
              <div class="doc-title-line">
                <span class="doc-number">${escapeHtml(displayAppendix(doc.appendixNumber))}</span>
                <span class="doc-project">${escapeHtml(doc.projectName)}</span>
              </div>
              <div class="doc-meta">
                <span>Контрагент: ${escapeHtml(doc.counterparty)}</span>
                ${doc.tenderNumber ? `<span>Решение: ${escapeHtml(doc.tenderNumber)}</span>` : ''}
                ${doc.internalNumber ? `<span>Внутренний номер: ${escapeHtml(doc.internalNumber)}</span>` : ''}
                ${hasDecisionAlert ? `<button class="decision-alert" type="button" data-action="decision-help"><span class="bang">!</span> Решение на согласовании</button>` : ''}
                ${hasComment ? `<button class="comment-pill" type="button" data-action="toggle-comment">Комментарий</button>` : ''}
              </div>
            </div>
            <div class="steps">
              ${renderSteps(doc)}
            </div>
            <div class="extra-tags">
              <button class="mkt-flag ${doc.mktDone ? 'is-on' : ''}" type="button" data-action="mkt">
                <span class="mkt-dollar">$</span>
                В МКТ
              </button>
            </div>
            <div class="row-actions">
              <button class="mini-btn" type="button" data-action="duplicate" aria-label="Дублировать в новый месяц">⧉</button>
              <button class="mini-btn" type="button" data-action="edit" aria-label="Редактировать">✎</button>
              <button class="mini-btn delete" type="button" data-action="delete" aria-label="Удалить">✕</button>
            </div>
            ${hasComment ? `<div class="comment-box ${commentOpen ? 'open' : ''}"><div class="comment-content">${escapeHtml(doc.comment)}</div></div>` : ''}
          </article>
        `;
      }).join('');

      bindRowActions();
    }

    function renderSteps(doc) {
      const currentIndex = STEPS.findIndex(step => step.key === doc.status);
      return STEPS.map((step, index) => {
        let className = 'step';
        if (doc.status === 'approved') {
          className += ' is-done';
        } else if (index < currentIndex) {
          className += ' is-done';
        } else if (index === currentIndex) {
          className += ' is-current';
        }
        return `<button class="${className}" type="button" data-step="${step.key}">${step.label}</button>`;
      }).join('');
    }

    function bindRowActions() {
      document.querySelectorAll('.doc-row').forEach(row => {
        const id = row.dataset.id;
        row.querySelectorAll('.step').forEach(button => {
          button.addEventListener('click', () => updateStatus(id, button.dataset.step));
        });
        row.querySelector('[data-action="edit"]').addEventListener('click', () => openEdit(id));
        row.querySelector('[data-action="delete"]').addEventListener('click', () => removeDoc(id));
        row.querySelector('[data-action="mkt"]').addEventListener('click', () => toggleMkt(id));
        row.querySelector('[data-action="duplicate"]').addEventListener('click', () => duplicateDoc(id));

        const commentBtn = row.querySelector('[data-action="toggle-comment"]');
        if (commentBtn) {
          commentBtn.addEventListener('click', () => toggleComment(id));
        }

        const decisionBtn = row.querySelector('[data-action="decision-help"]');
        if (decisionBtn) {
          decisionBtn.addEventListener('click', () => alert('Напоминание: по этому документу тендерное решение еще на согласовании.')); 
        }
      });
    }

    function updateStatus(id, stepKey) {
      state.docs = state.docs.map(doc => doc.id === id ? { ...doc, status: stepKey } : doc);
      saveDocs();
      render();
    }

    function toggleMkt(id) {
      state.docs = state.docs.map(doc => doc.id === id ? { ...doc, mktDone: !doc.mktDone } : doc);
      saveDocs();
      render();
    }

    function toggleComment(id) {
      if (state.openComments.has(id)) state.openComments.delete(id);
      else state.openComments.add(id);
      render();
    }

    function duplicateDoc(id) {
      const doc = state.docs.find(item => item.id === id);
      if (!doc) return;
      const nextMonth = shiftMonth(doc.month || state.activeMonth, 1);
      const duplicate = {
        ...doc,
        id: crypto.randomUUID(),
        month: nextMonth,
        appendixNumber: '',
        status: 'on_me',
        mktDone: false,
        comment: doc.comment || '',
        sortIndex: state.docs.length ? Math.max(...state.docs.map(item => item.sortIndex ?? 0)) + 1 : 0
      };
      state.docs = [...state.docs, duplicate];
      saveDocs();
      state.activeMonth = nextMonth;
      activeMonthInput.value = nextMonth;
      render();
      alert('Документ продублирован в следующий месяц. Осталось только указать новый номер приложения.');
      openEdit(duplicate.id);
    }

    function openModal(editing = false) {
      docModal.classList.add('open');
      docModal.setAttribute('aria-hidden', 'false');
      monthInput.value = monthInput.value || state.activeMonth;
      modalTitle.textContent = editing ? 'Редактирование документа' : 'Новый документ';
      saveBtn.textContent = editing ? 'Сохранить изменения' : 'Сохранить';
      setTimeout(() => appendixNumber.focus(), 40);
    }

    function closeModal() {
      docModal.classList.remove('open');
      docModal.setAttribute('aria-hidden', 'true');
      resetForm();
    }

    function resetForm() {
      docForm.reset();
      docId.value = '';
      monthInput.value = state.activeMonth;
      modalTitle.textContent = 'Новый документ';
      saveBtn.textContent = 'Сохранить';
    }

    function openEdit(id) {
      const doc = state.docs.find(item => item.id === id);
      if (!doc) return;
      docId.value = doc.id;
      monthInput.value = doc.month;
      appendixNumber.value = doc.appendixNumber;
      internalNumber.value = doc.internalNumber || '';
      tenderNumber.value = doc.tenderNumber || '';
      projectName.value = doc.projectName;
      counterparty.value = doc.counterparty;
      commentInput.value = doc.comment || '';
      openModal(true);
    }

    function removeDoc(id) {
      const doc = state.docs.find(item => item.id === id);
      if (!doc) return;
      if (!confirm(`Удалить документ «${doc.projectName}»?`)) return;
      state.docs = state.docs.filter(item => item.id !== id);
      state.openComments.delete(id);
      saveDocs();
      render();
    }

    function displayAppendix(value) {
      const raw = String(value || '').trim();
      if (!raw) return 'Приложение';
      return /^приложение/i.test(raw) ? raw : `Приложение ${raw}`;
    }

    function shiftMonth(month, diff) {
      const [year, currentMonth] = month.split('-').map(Number);
      const date = new Date(year, currentMonth - 1 + diff, 1);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function isDecisionInProgress(value) {
      const raw = String(value || '').trim().toLowerCase();
      return raw.includes('на согласовании');
    }

    function formatMonth(value) {
      const [year, month] = value.split('-');
      return new Date(Number(year), Number(month) - 1, 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    openModalBtn.addEventListener('click', () => {
      monthInput.value = state.activeMonth;
      openModal(false);
    });
    closeModalBtn.addEventListener('click', closeModal);
    projectsMonthBtn.addEventListener('click', openProjectsModal);
    closeProjectsModalBtn.addEventListener('click', closeProjectsModal);
    projectsModal.addEventListener('click', (event) => { if (event.target === projectsModal) closeProjectsModal(); });
    cancelBtn.addEventListener('click', closeModal);
    docModal.addEventListener('click', (event) => {
      if (event.target === docModal) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && docModal.classList.contains('open')) closeModal();
      if (event.key === 'Escape' && projectsModal.classList.contains('open')) closeProjectsModal();
    });

    docForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const payload = {
        id: docId.value || crypto.randomUUID(),
        month: monthInput.value || state.activeMonth,
        appendixNumber: appendixNumber.value.trim(),
        internalNumber: internalNumber.value.trim(),
        tenderNumber: tenderNumber.value.trim(),
        projectName: projectName.value.trim(),
        counterparty: counterparty.value.trim(),
        comment: commentInput.value.trim(),
        status: 'on_me',
        mktDone: false,
        sortIndex: state.docs.length ? Math.max(...state.docs.map(doc => doc.sortIndex ?? 0)) + 1 : 0
      };

      if (!payload.appendixNumber || !payload.projectName || !payload.counterparty) return;

      if (docId.value) {
        const oldDoc = state.docs.find(doc => doc.id === docId.value);
        if (oldDoc) {
          payload.status = oldDoc.status;
          payload.mktDone = Boolean(oldDoc.mktDone);
          payload.sortIndex = oldDoc.sortIndex ?? 0;
        }
      }

      const exists = state.docs.some(doc => doc.id === payload.id);
      state.docs = exists
        ? state.docs.map(doc => doc.id === payload.id ? payload : doc)
        : [...state.docs, payload];

      rememberSupplier(payload.counterparty);
      saveDocs();
      closeModal();
      render();
    });

    const formFields = [monthInput, appendixNumber, projectName, counterparty, internalNumber, tenderNumber, commentInput];
    formFields.forEach((field, index) => {
      field.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' || field.tagName === 'TEXTAREA') return;
        event.preventDefault();
        const next = formFields[index + 1];
        if (next) next.focus();
        else saveBtn.focus();
      });
    });

    tenderNumber.addEventListener('input', () => {
      const value = tenderNumber.value.trim().toLowerCase();
      if (value === 'на') tenderNumber.value = 'на согласовании';
    });

    activeMonthInput.addEventListener('input', () => {
      if (!activeMonthInput.value) return;
      state.activeMonth = activeMonthInput.value;
      monthInput.value = state.activeMonth;
      render();
    });
    statusFilter.addEventListener('change', render);
    searchInput.addEventListener('input', render);
    prevMonthBtn.addEventListener('click', () => {
      state.activeMonth = shiftMonth(state.activeMonth, -1);
      activeMonthInput.value = state.activeMonth;
      monthInput.value = state.activeMonth;
      render();
    });
    nextMonthBtn.addEventListener('click', () => {
      state.activeMonth = shiftMonth(state.activeMonth, 1);
      activeMonthInput.value = state.activeMonth;
      monthInput.value = state.activeMonth;
      render();
    });
  </script>
</body>
</html>

<script>
(async function bootstrapPersistence(){
  try {
    if (typeof api !== 'undefined') {
      docs = await api.getDocuments();
      supplierNames = await api.getSuppliers();
      if (typeof renderAll === 'function') renderAll();
    }
  } catch (e) {
    console.error('API bootstrap failed', e);
  }
})();
</script>
